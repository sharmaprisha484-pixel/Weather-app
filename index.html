<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather-App</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
     <h1>Weather App</h1>

     <input type="text"
         id="city"
         placeholder="Enter City Name"
         onkeypress="if(event.key==='Enter') test()"
        >

     <button onclick="test()">Search</button>

     <h2>Weather Details</h2>

     <p> 🌡️ Temperature : <span id="temp">--</span></p>

     <p> 🌤️ Condition : <span id="condition">--</span></p> 

     <p> 💧 Humidity : <span id="humidity">--</span></p>

     <p> 🍃 Wind Speed : <span id="wind">--</span></p>

     <p> 🌝 Feels Like : <span id="feels">--</span></p>

     <p> 🗓️ Day & Date : <span id="date">--</span></p>

     <img id="icon" width="100">

     <p id="loading"></p>

     <h3 id="cityName">City Name</h3>

     

     <button onclick="getLocation()">📍Use My Location</button>

     <button onclick="changeUnit()">℉</button>

     

      <script src="script.js"></script>
</body>
</html>
